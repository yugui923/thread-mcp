# Yuri devcontainer docker-compose.yml
# Last updated: 2026-07-15

# Used by VS Code Dev Containers extension

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    init: true
    mem_limit: 12g
    # Docker interprets this as RAM + swap, so 24 GiB allows 12 GiB of swap.
    memswap_limit: 24g
    cpus: 6.0
    pids_limit: 4096
    shm_size: "4gb"
    hostname: "thread-mcp"
    volumes:
      - ..:/workspace
      - claude-code-data:/home/vscode/.claude
      - codex-data:/home/vscode/.codex
    network_mode: host
    command: sleep infinity

volumes:
  claude-code-data:
    name: thread-mcp-claude-code-data
  codex-data:
    name: thread-mcp-codex-data
